<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Per Sofi 🤍</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="hearts"></div>





<!-- INTRO -->

<div id="home" class="page">


<h1>
Sto preparando qualcosa per te 🤍
</h1>


<p>
Un piccolo regalo sta prendendo forma...
</p>



<div class="loading">

<div id="bar"></div>

</div>


<p id="percent">
0%
</p>



<button id="start" hidden>

INIZIA IL VIAGGIO ✨🤍

</button>


</div>








<!-- BIGLIETTINO -->

<div id="ticket" class="page hidden">


<div class="ticket-card">


<h2>
💌 Domanda importante
</h2>


<p>
Vuoi continuare questo viaggio con me? 🤍
</p>



<button id="yes">

Sì 🤍

</button>



<button id="no">

No 😢

</button>



</div>


</div>








<!-- COMPLEANNO 🎂 -->

<div class="birthday-box">


<h1>
🎂 Buon compleanno amore mio 🤍
</h1>



<p>
Spegni tutte le candeline cliccandole ed esprimi un desiderio! ✨
</p>





<div id="cake">


    <div class="cake-base">

    </div>



    <div class="cake-cream">

    </div>



    <div id="candles">

    </div>



</div>





<p id="counter">

Candeline rimaste: 19

</p>



</div>


</div>








<script src="script.js"></script>

</html>
