<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Per Noi ❤️</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<link rel="stylesheet" href="style.css">

</head>



<body>


<div id="background"></div>





<!-- ===================
     INTRO
=================== -->


<section id="intro" class="scene active">


<div class="glass-box">


<p class="chapter">
Capitolo I
</p>


<h1>
Sto preparando qualcosa per te ❤️
</h1>


<p id="loadingText">
Un piccolo regalo sta prendendo forma...
</p>



<div class="loading-bar">

<div id="progress"></div>

</div>



<p id="percent">
0%
</p>




<button id="start" hidden>

Inizia il viaggio ✨

</button>



</div>


</section>






<!-- ===================
     BIGLIETTINO
=================== -->


<section id="question" class="scene">


<div class="ticket">


<p class="chapter">
Capitolo II
</p>


<h2>
💌 Domanda importante
</h2>


<p>
Vuoi continuare questo viaggio con me? ❤️
</p>


<button id="yes">
Sì ❤️
</button>


<button id="no">
No 😢
</button>


</div>


</section>






<!-- ===================
     COMPLEANNO
=================== -->


<section id="birthday" class="scene">


<div class="glass-box">


<p class="chapter">
Capitolo III
</p>


<h1>
🎂 Buon compleanno amore mio
</h1>


<p>
La sorpresa continua...
</p>


</div>


</section>






<script src="script.js"></script>


</body>

</html>
