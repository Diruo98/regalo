<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Per te ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <!-- SFONDO CUORI -->
    <div id="hearts"></div>



    <!-- PAGINA INIZIALE -->

    <div class="container" id="home">

        <h1>
            Sto preparando qualcosa per te ❤️
        </h1>


        <div class="loading">

            <div id="bar"></div>

        </div>


        <p id="percent">
            0%
        </p>


        <button id="start" hidden>
            INIZIA ❤️
        </button>

    </div>




    <!-- BIGLIETTINO -->

    <div id="ticket" class="ticket">


        <div class="ticket-card">


            <h2>
                💌 Domanda importante
            </h2>


            <p>
                Vuoi essere la mia fidanzata? ❤️
            </p>


            <button id="yes">
                Confermo ❤️
            </button>


            <button id="no">
                No 😢
            </button>


        </div>


    </div>





    <!-- FINALE DELLA PRIMA PARTE -->

    <div id="success" class="success">


        <h1>
            😍 Risposta corretta!
        </h1>


        <p>
            Sapevo che avresti scelto così ❤️
        </p>


        <p>
            Il nostro viaggio sta iniziando...
        </p>


    </div>




    <script src="script.js"></script>


</body>

</html>
