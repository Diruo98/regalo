<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Per te ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div id="hearts"></div>



<!-- CAPITOLO 1 -->

<section id="home" class="page active">


    <h1>
        Sto preparando qualcosa per te ❤️
    </h1>


    <div class="loading">

        <div id="bar"></div>

    </div>


    <p id="percent">
        0%
    </p>


    <button id="start" hidden>
        INIZIA ❤️
    </button>


</section>





<!-- CAPITOLO 2 -->

<section id="ticket" class="page">


    <div class="ticket-card">


        <h2>
            💌 Domanda importante
        </h2>


        <p>
            Vuoi essere la mia fidanzata? ❤️
        </p>


        <button id="yes">
            Confermo ❤️
        </button>


        <button id="no">
            No 😢
        </button>


    </div>


</section>





<!-- CAPITOLO 3 -->

<section id="birthday" class="page">


    <h1>
        🎂 Buon compleanno amore mio ❤️
    </h1>


    <p>
        Spegni tutte le candeline ✨
    </p>


    <div class="cake">

        🕯️ 🕯️ 🕯️

        <br>

        🎂

    </div>


    <p id="candlesText">
        Candeline rimaste: 3
    </p>


</section>





<!-- CAPITOLO FINALE -->


<section id="final" class="page">


    <h1>
        ❤️ Per te
    </h1>


    <p>
        Questo è solo l'inizio della nostra storia...
    </p>


</section>



<script src="script.js"></script>


</body>

</html>
